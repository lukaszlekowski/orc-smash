roles:
  auditor:      roles/auditor.md
  planner:      roles/planner.md
  reviewer:     roles/reviewer.md
  implementer:  roles/implementer.md

skills:
  plan-audit:
    file: skills/21-simple-plans-audit/SKILL.md
    role: auditor
    kind: audit
    agent: opencode
    model: opencode-go/deepseek-v4-flash
  plan-follow-up:
    file: skills/22-simple-plans-follow-up/SKILL.md
    role: planner
    kind: follow-up
    agent: opencode
    model: opencode-go/deepseek-v4-flash
  review:
    file: skills/40-simple-review/SKILL.md
    role: reviewer
    kind: audit
    agent: opencode
    model: opencode-go/deepseek-v4-flash
  review-follow-up:
    file: skills/42-simple-review-follow-up/SKILL.md
    role: implementer
    kind: follow-up
    agent: opencode
    model: opencode-go/deepseek-v4-flash

loops:
  plan:
    kind: doc-audit
    target: docs/dev/plan.md
    targetKind: file
    audit: plan-audit
    follow-up: plan-follow-up
    auditPattern: "docs/dev/plan-audit-v{n}-{agent}.md"
    followUpPattern: "docs/dev/plan-followup-v{n}-{agent}.md"
    inputs:
      - { label: "Target document",      source: target }
      - { label: "Audit version",        source: version }
      - { label: "Prior audit (v2+)",    source: priorAudit }
      - { label: "Write your output to", source: outputPath }
  implement:
    kind: code-review
    target: "."
    targetKind: worktree
    planPath: docs/dev/plan.md
    checklistPath: none
    audit: review
    follow-up: review-follow-up
    auditPattern: "docs/dev/review-v{n}-{agent}.md"
    followUpPattern: "docs/dev/review-followup-v{n}-{agent}.md"
    inputs:
      - { label: "Plan document",          source: planPath }
      - { label: "Feature checklist",      source: checklistPath }
      - { label: "Target (working tree)",  source: target }
      - { label: "Review version",         source: version }
      - { label: "Prior review (v2+)",     source: priorAudit }
      - { label: "Write your output to",   source: outputPath }
