providers:
  opencode:
    - opencode-go/deepseek-v4-flash
    - opencode-go/deepseek-v4-pro
    - opencode-go/glm-5.2
    - opencode-go/minimax-m3
    - opencode-go/qwen3.7-max
  claude:
    - glm-4.7
    - glm-5.1
    - glm-5.2
    - glm-5.2[1m]
  codex:
    - gpt-5.5
    - gpt-5.4
    - gpt-5.4-mini
defaults:
  agent: opencode
  model: opencode-go/deepseek-v4-flash

timeouts:
  opencode: 0  # watchdog timeout in milliseconds (0 disables the opencode watchdog)
